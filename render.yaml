services:
  - type: web
    name: financescout-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ADMIN_TOKEN
        generateValue: true

  - type: web
    name: financescout-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: financescout-api
          type: web
          property: hostport
